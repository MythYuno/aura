<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA / iOS Web App -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AURA" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />

  <!-- Theme color: respects system dark/light, matches in-app bg per mode -->
  <meta name="theme-color" content="#06121A" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#F4F8F7" media="(prefers-color-scheme: light)" />
  <meta name="color-scheme" content="dark light" />

  <!-- SEO + social -->
  <meta name="description" content="AURA — Tracker finanze personali. Privacy-first, offline-first, zero cloud." />
  <meta property="og:title" content="AURA — Finanze personali" />
  <meta property="og:description" content="Tracker finanze personali. Zero cloud, totale privacy." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="./icon.svg" />
  <meta name="twitter:card" content="summary" />

  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="apple-touch-icon" href="./icon.svg" />

  <!-- Geist font: preconnect + font-display swap to avoid blocking paint -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Inline FOUC guard: paint correct bg/color even before CSS arrives -->
  <style>
    html, body { background: #06121A; color: rgba(255,255,255,0.95); margin: 0; }
    @media (prefers-color-scheme: light) {
      html, body { background: #F4F8F7; color: rgba(15,18,24,0.96); }
    }
  </style>

  <title>AURA — Finanze personali</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
